name: Build and Push Docker Image

on:
  push:
    branches: [main]
  schedule:
    # Run daily at 00:00 UTC
    - cron: "0 0 * * *"
  workflow_dispatch:
    inputs:
      target:
        description: "PyPI package to build"
      entry:
        description: "Module entry point"
      image-name:
        description: "The final image name including username - ex. 'isfopo/ankisyncserver'"

env:
  TARGET: ${{ github.event.inputs.target || vars.TARGET }}
  ENTRY: ${{ github.event.inputs.entry || vars.ENTRY }}
  IMAGE_NAME: ${{ vars.IMAGE_NAME }}

jobs:
  build:
    runs-on: ubuntu-latest
    environment: Build Runner

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate configuration
        run: |
          if [ -z "${{ env.TARGET }}" ]; then
            echo "::error::TARGET is not set. Add it as a repository/environment variable or provide it via workflow_dispatch."
            exit 1
          fi
          if [ -z "${{ env.ENTRY }}" ]; then
            echo "::error::ENTRY is not set. Add it as a repository/environment variable or provide it via workflow_dispatch."
            exit 1
          fi
          if [ -z "${{ env.IMAGE_NAME }}" ]; then
            echo "::error::IMAGE_NAME is not set. Add it as a repository/environment variable (not a secret — vars are accessed via vars.*, secrets via secrets.*)."
            exit 1
          fi

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: latest

      - name: Get latest version
        id: get-version
        run: |
          VERSION=$(curl -s https://pypi.org/pypi/${{ env.TARGET }}/json \
            | python3 -c "import sys, json; print(json.load(sys.stdin)['info']['version'])")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PW }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            TARGET=${{ env.TARGET }}
            ENTRY=${{ env.ENTRY }}
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:v${{ steps.get-version.outputs.version }}
