name: Build and Push Docker Image

on:
  push:
    branches: [main]
  schedule:
    # Run daily at 00:00 UTC
    - cron: "0 0 * * *"
  workflow_dispatch:
    inputs:
      target:
        description: "PyPI package to build"
      entry:
        description: "Module entry point"

env:
  TARGET: ${{ github.event.inputs.target }}
  ENTRY: ${{ github.event.inputs.entry }}

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get latest version
        id: get-version
        run: |
          VERSION=$(curl -s https://pypi.org/pypi/${{ env.TARGET }}/json \
            | python3 -c "import sys, json; print(json.load(sys.stdin)['info']['version'])")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PW }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            TARGET=${{ env.TARGET }}
            ENTRY=${{ env.ENTRY }}
          tags: |
            ${{ secrets.DOCKER_USER }}/${{ github.event.repository.name }}:latest
            ${{ secrets.DOCKER_USER }}/${{ github.event.repository.name }}:v${{ steps.get-version.outputs.version }}
