name: Build and Push Docker Image

on:
  push:
    branches: [main]
  schedule:
    # Run daily at 00:00 UTC
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Fetch the latest anki version from PyPI so we can tag the image
      - name: Get latest anki version
        id: anki-version
        run: |
          ANKI_VERSION=$(curl -s https://pypi.org/pypi/anki/json \
            | python3 -c "import sys, json; print(json.load(sys.stdin)['info']['version'])")
          echo "version=$ANKI_VERSION" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PW }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            cryptkiddie2/ankisyncserver:latest
            cryptkiddie2/ankisyncserver:v${{ steps.anki-version.outputs.version }}
